<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - NexturaStore</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://orcelebration.com/be/20/38/be20385dc7683a578a48751fe4def42d.js"></script>

</head>
<body data-theme="dark">
    <div id="loading-overlay" style="display: flex;">Memeriksa Sesi...</div>

    <header class="app-header">
        <div class="header-left">
            <button class="icon-btn" id="btn-menu">
                <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
            </button>
            <div class="logo-title">Nextura<span>Store</span></div>
        </div>
        
        <div class="header-right">
            <button class="icon-btn" id="btn-search">
                <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            </button>
            
            <button class="icon-btn" id="btn-theme">
                <svg id="icon-moon" viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8C12.18 3.06 12.09 3 12 3z"/></svg>
            </button>

            <div class="profile-container">
                <img id="user-avatar" src="https://ui-avatars.com/api/?name=User" alt="Foto Profil" class="user-avatar" onclick="toggleDropdown()">

                <div id="profile-dropdown" class="dropdown-menu">
                    <div class="user-info">
                        <span id="user-name" class="user-name">Memuat...</span>
                        <span id="user-email" class="user-email">user@email.com</span>
                    </div>
                    <hr class="dropdown-divider">
                    <button id="btn-logout" class="logout-btn">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                            <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5-5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
                        </svg>
                        <span>Keluar</span>
                    </button>
                </div>
            </div>
        </div>
        
        <div class="search-overlay" id="search-bar">
            <input type="text" class="search-input" placeholder="Cari aplikasi...">
            <button class="icon-btn" id="btn-close-search">
                <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
        </div>
    </header>

    <main>
        <section id="store-section" class="section active">
            <div class="alert-box" id="store-alert">
                <span>✅ Produk <b>ORIGINAL PREMIUM 100%</b>, bukan MOD/bajakan.</span>
                <button class="icon-btn" onclick="document.getElementById('store-alert').classList.add('hidden')">
                    <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                </button>
            </div>
            <div class="grid-container" id="store-list"></div>
        </section>

        <section id="mod-section" class="section">
            <div class="alert-box">
                <span>⚠️ Ini aplikasi <b>MOD gratis</b>, tanpa bayar tapi lebih banyak bug/error.</span>
            </div>
            <div class="grid-container" id="mod-list"></div>
        </section>

        <section id="testi-section" class="section">
            <h2 style="margin-bottom: 1rem; font-size: 1.2rem;">Testimoni Pelanggan</h2>
            <div class="grid-container" id="testi-list"></div>
        </section>

        <section id="detail-section" class="section">
            <button class="btn-secondary btn-primary" id="btn-back" style="margin-bottom: 1.5rem;">&larr; Kembali</button>
            <div id="detail-content"></div>
        </section>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item" data-target="mod-section">
            <svg viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71L12 2zm0 2.58l5.36 12.86-5.36-2.36-5.36 2.36L12 4.58z"/></svg>
            Mod
        </div>
        <div class="nav-item center-btn active" data-target="store-section">
            <svg viewBox="0 0 24 24"><path d="M20 4H4v2h16V4zm1 10v-2l-1-5H4l-1 5v2h1v6h10v-6h4v6h2v-6h1zm-9 4H6v-4h6v4z"/></svg>
            Store
        </div>
        <div class="nav-item" data-target="testi-section">
            <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"/></svg>
            Testi
        </div>
    </nav>

    <script type="module" src="script.js"></script>
</body>
</html>
