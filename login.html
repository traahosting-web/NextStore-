<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NexturaStore</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark">
    <div id="loading-overlay">Memproses...</div>
    <div class="auth-container">
        <h1 class="logo-title" style="margin-bottom: 2rem;">Nextura<span>Store</span></h1>
        <div class="auth-box">
            <h2 class="auth-title" id="auth-title">Login</h2>
            
            <div id="auth-error" class="error-message"></div>

            <form id="login-form">
                <div class="form-group">
                    <input type="email" id="email" class="form-control" placeholder="Email" required>
                </div>
                
                <div class="form-group">
                    <input type="password" id="password" class="form-control" placeholder="Password" required>
                </div>
                
                <div style="text-align: right; margin-top: -0.5rem; margin-bottom: 1rem;">
                    <a href="#" id="btn-forgot" style="color: var(--accent-color, #3b82f6); font-size: 0.85rem; text-decoration: none;">Lupa Password?</a>
                </div>

                <button type="submit" class="btn-primary">Masuk</button>
            </form>

            <form id="reset-form" style="display: none;">
                <p style="color: var(--text-secondary, #94a3b8); font-size: 0.85rem; margin-bottom: 1.2rem; text-align: center;">
                    Masukkan email Anda untuk menerima tautan reset password.
                </p>
                
                <div id="reset-error" class="error-message" style="display: none; margin-bottom: 1rem;"></div>

                <div class="form-group">
                    <input type="email" id="reset-email" class="form-control" placeholder="Email Anda" required>
                </div>
                
                <button type="submit" class="btn-primary" style="margin-bottom: 0.8rem; width: 100%;">Kirim Link Reset</button>
                <button type="button" id="btn-back-login" class="btn-secondary" style="width: 100%; padding: 0.75rem; border-radius: 6px; background: transparent; color: #fff; border: 1px solid rgba(255, 255, 255, 0.2); cursor: pointer;">Kembali</button>
            </form>

            <div class="divider">ATAU</div>

            <button id="btn-google" class="btn-primary btn-google">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Login dengan Google
            </button>

            <a href="register.html" class="auth-link">Belum punya akun? Daftar di sini</a>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
