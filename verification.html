<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi Kode - Store/Mod App</title>
    <style>
        :root {
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --primary-color: #3b82f6;
            --text-main: #1f2937;
            --text-secondary: #4b5563;
            --success: #10b981;
            --error: #ef4444;
            --border-color: #d1d5db;
        }

        [data-theme="dark"] {
            --bg-color: #111827;
            --card-bg: #1f2937;
            --text-main: #f9fafb;
            --text-secondary: #9ca3af;
            --border-color: #374151;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo-box {
            width: 64px;
            height: 64px;
            background-color: rgba(59, 130, 246, 0.1);
            color: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 1.75rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        input {
            width: 100%;
            padding: 0.85rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1.1rem;
            background-color: var(--card-bg);
            color: var(--text-main);
            text-align: center;
            letter-spacing: 6px;
            transition: border-color 0.15s ease-in-out;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .btn-primary {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.85rem;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-bottom: 1.25rem;
        }

        .btn-primary:hover {
            background-color: #2563eb;
        }

        .message {
            display: none;
            padding: 0.75rem;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 1.25rem;
            border: 1px solid transparent;
        }

        .footer-text {
            font-size: 0.825rem;
            color: var(--text-secondary);
        }

        .footer-text a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        /* Loading Overlay */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(2px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
            color: white;
            font-size: 1.1rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div>Memverifikasi kode...</div>
    </div>

    <div class="container">
        <div class="logo-box">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
        </div>

        <h2>Masukkan Kode Verifikasi</h2>
        <p>Kami telah mengirimkan kode verifikasi 6 digit ke email Anda. Silakan periksa kotak masuk atau folder spam.</p>

        <div id="auth-error" class="message" style="background: rgba(239, 68, 68, 0.1); border-color: #ef4444; color: #ef4444;"></div>
        <div id="auth-success" class="message" style="background: rgba(16, 185, 129, 0.1); border-color: #10b981; color: #10b981;"></div>

        <form id="verification-form">
            <div class="input-group">
                <label for="verification-code">Kode OTP</label>
                <input type="text" id="verification-code" placeholder="******" maxlength="6" pattern="\d{6}" autocomplete="off" required>
            </div>

            <button type="submit" class="btn-primary">Verifikasi</button>
        </form>

        <div class="footer-text">
            Belum menerima kode? <a id="btn-resend">Kirim Ulang</a>
        </div>
        
        <div style="margin-top: 1.25rem;">
            <a href="login.html" style="font-size: 0.8rem; color: var(--text-secondary);">Kembali ke halaman login</a>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const form = document.getElementById("verification-form");
            const codeInput = document.getElementById("verification-code");
            const errorEl = document.getElementById("auth-error");
            const successEl = document.getElementById("auth-success");
            const loadingOverlay = document.getElementById("loading-overlay");
            const btnResend = document.getElementById("btn-resend");

            // Sembunyikan pesan saat pengguna mengetik ulang
            codeInput.addEventListener("input", () => {
                errorEl.style.display = "none";
                successEl.style.display = "none";
            });

            // Submit Form Handler
            form.addEventListener("submit", function(e) {
                e.preventDefault();
                
                // Tampilkan loading overlay
                loadingOverlay.style.display = "flex";
                errorEl.style.display = "none";
                successEl.style.display = "none";

                const code = codeInput.value;

                // --- Ganti bagian ini dengan logika Firebase Anda ---
                // (Contoh validasi dummy untuk 6-digit angka)
                setTimeout(() => {
                    loadingOverlay.style.display = "none";

                    if (code === "123456") { // Ganti validasi dengan respon Firebase/backend Anda
                        successEl.innerText = "Verifikasi berhasil! Mengalihkan ke halaman utama...";
                        successEl.style.display = "block";
                        
                        setTimeout(() => {
                            window.location.href = "index.html";
                        }, 1500);
                    } else {
                        errorEl.innerText = "Kode yang Anda masukkan salah atau tidak valid.";
                        errorEl.style.display = "block";
                    }
                }, 2000); // Penundaan simulasi 2 detik
            });

            // Tombol Kirim Ulang
            btnResend.addEventListener("click", function() {
                // Tambahkan aksi pengiriman ulang OTP ke sini
                alert("Kode verifikasi baru telah dikirimkan ke email Anda!");
            });
        });
    </script>
</body>
</html>
